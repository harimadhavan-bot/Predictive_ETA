apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: eta-prediction-agent
  version: 1.0.0

type: agent

agentCard:
  name: Shipment ETA Prediction Agent
  version: 1.0.0
  description: >
    Predicts estimated time of arrival (ETA) for freight shipments.
    Accepts freight order details, retrieves relevant historical orders as context,
    and invokes SAP AI Core RPT1.5 to deliver data-driven ETA predictions for
    transportation planners.

container:
  buildPath: .
  port: 5000

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

models:
  - executableId: sap-rpt
    name: sap-rpt-1.5
    version: "1.5"
